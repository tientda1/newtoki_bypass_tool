<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 12px; font-family: monospace; background: #111; color: #eee; margin: 0; }
    h3 { color: #e00; margin: 0 0 8px; font-size: 14px; }
    .status { font-size: 11px; color: #888; margin-bottom: 8px; }
    .status.ok { color: #4f4; }
    .status.err { color: #f44; }
    button { background: #e00; color: #fff; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 12px; margin-right: 6px; }
    button:hover { background: #c00; }
    .info { font-size: 10px; color: #555; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>⬛ Newtoki Bridge</h3>
  <div class="status" id="status">Đang kiểm tra server...</div>
  <button id="scrape">🔄 Scrape trang này</button>
  <div class="info">Server: localhost:27420</div>
  <script src="popup.js"></script>
</body>
</html>
